<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TaskMaster - Iniciar sesión</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
    document.documentElement.style.visibility = "hidden";
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/login.css">
</head>
<body>

  <div class="auth-bg">
    <div class="auth-overlay"></div>

    <div class="auth-container">
      <div class="auth-card">

        <div class="auth-header">
          <img id="auth-logo" src="../assets/img/logo-dark.png" class="auth-logo">

          <div class="auth-title-group">
            <h1 class="auth-title">TaskMaster</h1>
            <p class="auth-subtitle">Organiza tu día como un profesional.</p>
          </div>

          <button id="theme-toggle" class="theme-toggle">🌙</button>
        </div>

        <form id="login-form" class="auth-form">
          <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" placeholder="tu@correo.com" required>
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" required>
          </div>

          <button class="btn-primary" type="submit">Iniciar sesión</button>
      

          <p class="auth-helper">
            ¿No tienes cuenta?
            <a href="../register/index.html">Crear una cuenta</a>
          </p>

          <p id="auth-message" class="auth-message"></p>
        </form>

      </div>
    </div>
  </div>

  <script src="./js/login.js"></script>
</body>
</html>
