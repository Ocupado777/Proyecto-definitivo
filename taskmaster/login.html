<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster - Iniciar Sesión</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/theme.css">
</head>

<body class="login-body">

    <!-- Fondo -->
    <div class="background-overlay"></div>

    <!-- Contenedor principal -->
    <div class="container d-flex justify-content-center align-items-center min-vh-100">

        <div class="login-card shadow-lg p-4 rounded-4 position-relative">

            <!-- Botón de tema -->
            <button id="themeToggle" class="theme-btn">
                🌙
            </button>

            <!-- Logo -->
            <div class="text-center mb-3">
                <img src="assets/images/logo-t.png" class="logo-img" alt="TaskMaster Logo">
            </div>

            <!-- Títulos -->
            <h2 class="text-center fw-bold mb-1">TaskMaster</h2>
            <p class="text-center text-muted mb-4">Organiza tu día como un profesional</p>

            <!-- Formulario -->
            <form id="loginForm">

                <div class="mb-3">
                    <label class="form-label">Correo electrónico</label>
                    <input type="email" id="email" class="form-control input-premium" placeholder="tu@correo.com" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" id="password" class="form-control input-premium" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-premium w-100 mt-2">
                    Iniciar sesión
                </button>

            </form>

            <!-- Mensaje dinámico -->
            <p id="loginMessage" class="text-center mt-3 message-area"></p>

            <!-- Enlace a registro -->
            <p class="text-center mt-3">
                ¿No tienes cuenta?
                <a href="register.html" class="link-premium">Crear una cuenta</a>
            </p>

        </div>
    </div>

    <!-- JS -->
    <script src="js/ui/theme-toggle.js"></script>
    <script src="js/auth/login.js"></script>
</body>
</html>
